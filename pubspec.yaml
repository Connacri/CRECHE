name: creche
description: "🧸 Crèche - L'Avenir de la Petite Enfance / The Future of Childcare"
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  supabase_flutter: ^2.12.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  intl: ^0.20.2
  lottie: ^3.3.2
  image_picker: ^1.2.1
  geolocator: ^13.0.1
  geocoding: ^4.0.0
  flutter_osm_plugin: ^1.4.3
  uuid: ^4.5.2
  go_router: ^17.2.3
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/8e16ab25c9b6075a09c2d7990984e21d.jpg"
  web:
    generate: true
    image_path: "assets/images/8e16ab25c9b6075a09c2d7990984e21d.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/lotties/
    - assets/icon/
    - assets/logos/
    - assets/seasons/
    - assets/qrcode/
