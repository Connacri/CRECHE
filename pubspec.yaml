name: creche
description: "🧸 Crèche - L'Avenir de la Petite Enfance / The Future of Childcare"
publish_to: 'none'
version: 1.2.78+93

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.4
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.2
  supabase_flutter: ^2.12.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  intl: ^0.20.2
  lottie: ^3.3.2
  image_picker: ^1.2.1
  image_cropper: ^8.0.2
  geolocator: ^13.0.1
  geocoding: ^4.0.0
  flutter_osm_plugin: ^1.4.3
  uuid: ^4.5.2
  go_router: ^17.2.3
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.3.0
  scrollable_positioned_list: ^0.3.8
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.5
  http: ^1.2.2
  permission_handler: ^12.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  file_picker: ^8.1.7
  shared_preferences: ^2.3.2
  share_plus: ^10.1.4
  readmore: ^3.0.0
  map_launcher: ^3.2.0
  google_sign_in: ^7.2.0
  mobile_scanner: ^6.0.4
  qr_flutter: ^4.1.0
  firebase_messaging: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpg"
  web:
    generate: true
    image_path: "assets/images/app_icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/lotties/
    - assets/icon/
    - assets/logos/
    - assets/seasons/
    - assets/qrcode/

flutter_native_splash:
  color: "#ffffff"
  background_image: "assets/images/splash_bg.jpg"
  fullscreen: true
  android_12:
    color: "#ffffff"
    background_image: "assets/images/splash_bg.jpg"
    fullscreen: true
