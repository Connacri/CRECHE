name: creche-ci

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: v
        run: |
          git fetch --tags --force
          LAST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.2.104"
          fi
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $NEW_VERSION"

  build-android:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ✅ Créer le .env directement dans ce job
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "✅ .env file created"
          # Vérification rapide
          if [ -f ".env" ]; then
            echo "✅ .env file verified"
          else
            echo "❌ .env file creation failed"
            exit 1
          fi

      - name: Install deps
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --android-skip-build-dependency-validation \
            --dart-define-from-file=.env

      - name: Prepare APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/creche-android.v${{ needs.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: release/creche-android.v${{ needs.version.outputs.version }}.apk
          retention-days: 30

  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ✅ Créer le .env pour Windows
      - name: Create .env file
        shell: pwsh
        run: |
          @"
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          "@ | Out-File -FilePath .env -Encoding utf8
          Write-Host "✅ .env file created"
          if (Test-Path ".env") {
            Write-Host "✅ .env file verified"
          } else {
            Write-Host "❌ .env file creation failed"
            exit 1
          }

      - name: Install deps
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define-from-file=.env

      - name: Build Installer
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version.outputs.version }}"
          $ROOT = "${{ github.workspace }}"
          $ISCC = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          
          $env:APP_VERSION = $VERSION
          
          $SOURCE_DIR = "$ROOT\build\windows\x64\runner\Release"
          $OUTPUT_DIR = "$ROOT\build\windows\installer"
          $ICON_FILE = "$ROOT\windows\runner\resources\app_icon.ico"
          $ISS_FILE = "$ROOT\windows\innosetup\setup.iss"

          if (Test-Path $ISCC) {
            Write-Host "Running ISCC..."
            & $ISCC `
              /DMySourceDir="$SOURCE_DIR" `
              /DMyOutputDir="$OUTPUT_DIR" `
              /DMyIconFile="$ICON_FILE" `
              /DMyAppVersion="$VERSION" `
              "$ISS_FILE"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "ISCC failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }

            New-Item -ItemType Directory -Force -Path "$ROOT\release"
          
            $INSTALLER_NAME = "creche-windows-installer.v$VERSION.exe"
            Copy-Item "$OUTPUT_DIR\creche-windows-installer.exe" "$ROOT\release\$INSTALLER_NAME"
          
            Write-Host "Creating ZIP..."
            Compress-Archive -Path "$SOURCE_DIR\*" -DestinationPath "$ROOT\release\creche-windows.v$VERSION.zip"
          } else {
            Write-Error "ISCC.exe not found at $ISCC"
            exit 1
          }

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/
          retention-days: 30

  release:
    needs: [version, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: out
          merge-multiple: true

      - name: List artifacts
        run: ls -R out

      - name: Create Git Tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag v${{ needs.version.outputs.version }} || echo "Tag v${{ needs.version.outputs.version }} already exists"
          git push origin v${{ needs.version.outputs.version }} || echo "Tag v${{ needs.version.outputs.version }} already exists on remote"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Crèche v${{ needs.version.outputs.version }}
          body: |
            Automated release for version ${{ needs.version.outputs.version }}.
            
            ### 🚀 Features
            - Supabase integration with secure environment variables
            
            ### 📦 Artifacts
            - 📱 Android APK
            - 🪟 Windows Installer
            - 🪟 Windows Portable (ZIP)
            
            ### 🔐 Security
            - All sensitive keys are stored in GitHub Secrets
            - Environment variables injected at build time
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}