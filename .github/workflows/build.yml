name: creche-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: v
        run: |
          git fetch --tags
          # Get the last tag, or default to v1.2.104
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.2.104")
          VERSION=${LAST_TAG#v}

          # Split version into major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Increment patch
          PATCH=$((PATCH + 1))
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $NEW_VERSION"

  build-android:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --build-name=${{ needs.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Prepare APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/creche-android.v${{ needs.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: release/creche-android.v${{ needs.version.outputs.version }}.apk

  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --build-name=${{ needs.version.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build Installer
        shell: pwsh
        run: |
          $VERSION = "${{ needs.version.outputs.version }}"
          $ROOT = "${{ github.workspace }}"
          $ISCC = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          
          # Paths relative to the root (since setup.iss now uses SourceDir=..\..)
          $SOURCE_DIR = "build\windows\x64\runner\Release"
          $OUTPUT_DIR = "build\windows\installer"
          $ICON_FILE = "windows\runner\resources\app_icon.ico"
          $ISS_FILE = "windows\innosetup\setup.iss"

          # Ensure output directory exists (relative to root)
          if (!(Test-Path "$ROOT\$OUTPUT_DIR")) {
            New-Item -ItemType Directory -Force -Path "$ROOT\$OUTPUT_DIR"
          }

          if (Test-Path $ISCC) {
            Write-Host "Running ISCC for version $VERSION..."
            
            # Define arguments for ISCC
            $isccArgs = @(
                "/DMyAppVersion=$VERSION",
                "/DMySourceDir=$SOURCE_DIR",
                "/DMyOutputDir=$OUTPUT_DIR",
                "/DMyIconFile=$ICON_FILE",
                "$ROOT\$ISS_FILE"
            )
            
            & $ISCC $isccArgs

            if ($LASTEXITCODE -ne 0) {
              Write-Error "ISCC failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }

            New-Item -ItemType Directory -Force -Path "$ROOT\release"
            
            $INSTALLER_PATH = "$ROOT\$OUTPUT_DIR\creche-windows-installer.exe"
            $DEST_PATH = "$ROOT\release\creche-windows-installer.v$VERSION.exe"
            
            if (Test-Path $INSTALLER_PATH) {
              Copy-Item $INSTALLER_PATH $DEST_PATH
              Write-Host "Installer copied to $DEST_PATH"
            } else {
              Write-Error "Installer not found at $INSTALLER_PATH"
              exit 1
            }
            
            Write-Host "Creating ZIP..."
            Compress-Archive -Path "$ROOT\$SOURCE_DIR\*" -DestinationPath "$ROOT\release\creche-windows.v$VERSION.zip"
          } else {
            Write-Error "ISCC.exe not found at $ISCC"
            exit 1
          }

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/

  release:
    needs: [version, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: out
          merge-multiple: true

      - name: List artifacts
        run: ls -R out

      - name: Create Git Tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          # We are in a detached HEAD or on a commit, let's push the tag
          git tag v${{ needs.version.outputs.version }}
          git push origin v${{ needs.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Crèche v${{ needs.version.outputs.version }}
          body: |
            Automated release for version ${{ needs.version.outputs.version }}.
            
            ### Artifacts
            - Android APK
            - Windows Installer
            - Windows Portable (ZIP)
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
