name: creche

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION="${LATEST_TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-android:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk \
          --release \
          --obfuscate \
          --split-debug-info=build/app/outputs/symbols

      - name: Prepare Artifact
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/creche-android.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: release-artifacts

  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts

          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath release-artifacts/creche-windows.zip

          if (Test-Path "build/windows/installer/creche-windows-installer.exe") {
            Copy-Item `
              "build/windows/installer/creche-windows-installer.exe" `
              -Destination "release-artifacts/creche-windows-installer.exe"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release-artifacts

  release:
    needs:
      - version
      - build-android
      - build-windows

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Crèche v${{ needs.version.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs:
      - version
      - release

    if: always()

    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Release Status: ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY