name: Multi-Platform Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/creche-android.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/creche-android.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Create Installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows/inno-setup.iss
      - name: Package Windows Zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath creche-windows-x64.zip
      - name: Upload Windows Zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: creche-windows-x64.zip
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/installer/creche-windows-installer.exe
          
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS
        run: |
          flutter config --no-enable-swift-package-manager
          flutter build ios --release --no-codesign --build-number=${{ github.run_number }}
      - name: Zip iOS App
        run: |
          cd build/ios/iphoneos
          zip -r ../../../creche-ios-app.zip Runner.app
      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-zip
          path: creche-ios-app.zip

  release:
    name: Create Release
    needs: [build-android, build-windows, build-ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.${{ github.run_number }}
          name: Release v1.2.${{ github.run_number }}
          files: |
            android-apk/creche-android.apk
            windows-installer/creche-windows-installer.exe
            windows-zip/creche-windows-x64.zip
            ios-zip/creche-ios-app.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
