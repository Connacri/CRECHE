name: creche-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "4.33.0"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Prepare APK
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
          release-artifacts/creche-android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: release-artifacts

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "4.33.0"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Installer and ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts

          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath release-artifacts/creche-windows.zip

          if (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe") {

            $env:APP_VERSION="${{ github.ref_name }}"
            $env:APP_VERSION=$env:APP_VERSION.Replace("v","")

            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
              windows\innosetup\setup.iss

            if (Test-Path "build\windows\installer\creche-windows-installer.exe") {

              Copy-Item `
                "build\windows\installer\creche-windows-installer.exe" `
                -Destination `
                "release-artifacts\creche-windows-installer.exe"
            }
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release-artifacts

  release:
    name: Create Release
    needs:
      - build-android
      - build-windows

    runs-on: ubuntu-latest

    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Crèche ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}