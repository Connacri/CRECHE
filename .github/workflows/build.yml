name: creche

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch/minor/major)'
        required: true
        default: 'patch'

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      build_number: ${{ steps.set_version.outputs.build_number }}
      should_release: ${{ steps.set_version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag or generate
        id: set_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == 'push' && "${{ github.ref }}" == 'refs/heads/main' ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.2.82")
            LATEST_VERSION="${LATEST_TAG##*v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Build Android
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Rename APK
  run: |
    mkdir -p release-artifacts
    cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/creche-android.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: release-artifacts/
          retention-days: 7

  build-windows:
    name: Build Windows
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Windows artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path release-artifacts
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "release-artifacts/creche-windows.zip"
          
          if (Test-Path "C:\Program Files (x86)\Inno Setup 6\iscc.exe") {
            & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows/inno-setup.iss
            if (Test-Path "build/windows/installer/creche-windows-installer.exe") {
              Copy-Item "build/windows/installer/creche-windows-installer.exe" -Destination "release-artifacts/creche-windows-installer.exe"
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release-artifacts/
          retention-days: 7

  release:
    name: Create Combined Release
    needs: [version, build-android, build-windows]
    if: needs.version.outputs.should_release == 'true' && (success() || failure())
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: all-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: all-artifacts
- name: Create Git Tag
  run: |
    git config user.name github-actions
    git config user.email github-actions@github.com

    if ! git rev-parse "v${{ needs.version.outputs.version }}" >/dev/null 2>&1; then
      git tag "v${{ needs.version.outputs.version }}"
      git push origin "v${{ needs.version.outputs.version }}"
    fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: "Crèche v${{ needs.version.outputs.version }}"
          files: all-artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          draft: false
          prerelease: false

  summary:
    name: Build Summary
    needs: [version, release]
    if: always() && needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ needs.version.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platform Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.release.result }}" == "success" ]]; then
            echo "✅ Release available: [v${{ needs.version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          fi
