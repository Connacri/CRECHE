name: creche-ci

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: v
        run: |
          git fetch --tags

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION=${LAST_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-android:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/creche-android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: release

  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Build Installer
        shell: pwsh
        run: |
          $env:APP_VERSION="${{ needs.version.outputs.version }}"

          if (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe") {

            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\innosetup\setup.iss

            New-Item -ItemType Directory -Force -Path release

            Copy-Item `
              "build\windows\installer\creche-windows-installer.exe" `
              "release\creche-windows-installer.exe"

            Compress-Archive `
              -Path build/windows/x64/runner/Release/* `
              -DestinationPath release/creche-windows.zip
          }

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release

  release:
    needs: [version, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: out

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: out

      - name: Create Git Tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git tag v${{ needs.version.outputs.version }}
          git push origin v${{ needs.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Crèche v${{ needs.version.outputs.version }}
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}